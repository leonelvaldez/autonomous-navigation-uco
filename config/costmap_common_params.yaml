# shared by global_costmap and local_costmap, loaded under each one's own
# namespace from move_base_uco.launch. params need to be nested under the
# layer name (obstacle_layer, inflation_layer, static_layer) matching the
# plugins list in global/local_costmap_params.yaml, otherwise the layer
# just ignores them.
#
# three observation sources feed the obstacle layer now:
#   - laser_scan_sensor: the real rplidar scan
#   - presence_zone_sensor: fake points from dynamic_costmap_updater.py
#     (task 6), published on /presence_zone_obstacles for zones where the
#     presence detector currently reports someone
#   - door_sensor: fake points from door_costmap_updater.py (extra
#     feature, not one of the 8 official tasks -- doors get mapped as
#     open space but can be closed in reality), published on
#     /door_obstacles for every door currently marked closed
#
# presence_zone_sensor and door_sensor both have clearing: false on
# purpose -- clearing is handled by their respective updater scripts
# calling clear_costmaps directly instead of raytrace clearing (there's
# no real sensor origin to raytrace from for fake points).

footprint: [[-0.22, -0.22], [-0.22, 0.22], [0.22, 0.22], [0.22, -0.22]]

obstacle_layer:
  observation_sources: laser_scan_sensor presence_zone_sensor door_sensor
  obstacle_range: 6.0
  raytrace_range: 6.5
  laser_scan_sensor:
    sensor_frame: laser_frame
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
  presence_zone_sensor:
    sensor_frame: map
    data_type: PointCloud2
    topic: /presence_zone_obstacles
    marking: true
    clearing: false
    min_obstacle_height: -1.0
    max_obstacle_height: 1.0
    # big obstacle_range on purpose: these are map-fixed virtual points,
    # not a real sensor. the layer default (6.0) is measured from the
    # source origin, which for sensor_frame map is (0,0) -- so any zone
    # more than 6m from the map origin would silently never get marked.
    obstacle_range: 100.0
  door_sensor:
    sensor_frame: map
    data_type: PointCloud2
    topic: /door_obstacles
    marking: true
    clearing: false
    min_obstacle_height: -1.0
    max_obstacle_height: 1.0
    # same reason as presence_zone_sensor above -- doors can be anywhere
    # on the map, so don't let the 6m default drop the far ones
    obstacle_range: 100.0

inflation_layer:
  inflation_radius: 0.4
  cost_scaling_factor: 5.0

static_layer:
  map_topic: /map
  subscribe_to_updates: true
