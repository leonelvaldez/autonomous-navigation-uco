# AMCL parameters -- tuned for TurtleBot2 (Kobuki, differential drive) + RPLidar A2M8.
# laser_max_range matches the maxUrange already proven in gmapping (Task 2)
# for consistency, rather than the lidar's absolute hardware maximum of 12m.

odom_model_type: diff
odom_alpha1: 0.2
odom_alpha2: 0.2
odom_alpha3: 0.2
odom_alpha4: 0.2
odom_alpha5: 0.1
transform_tolerance: 1.0
gui_publish_rate: 10.0

laser_max_range: 6.0
laser_min_range: 0.15
laser_max_beams: 180
laser_z_hit: 0.5
laser_z_short: 0.05
laser_z_max: 0.05
laser_z_rand: 0.5
laser_sigma_hit: 0.2
laser_lambda_short: 0.1
laser_likelihood_max_dist: 2.0
laser_model_type: likelihood_field

update_min_d: 0.2
update_min_a: 0.5
resample_interval: 1
recovery_alpha_slow: 0.001
recovery_alpha_fast: 0.1

initial_pose_x: 0.0
initial_pose_y: 0.0
initial_pose_a: 0.0

base_frame_id: base_footprint
odom_frame_id: odom
global_frame_id: map
